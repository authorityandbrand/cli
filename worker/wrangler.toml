name = "gws-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for storing OAuth tokens per user
[[kv_namespaces]]
binding = "TOKEN_STORE"
id = "PLACEHOLDER_KV_ID"

# Uncomment after creating with: npx wrangler d1 create gws-audit-log
# [[d1_databases]]
# binding = "AUDIT_LOG"
# database_name = "gws-audit-log"
# database_id = "PLACEHOLDER_D1_ID"

[vars]
# Non-secret config
OAUTH_SCOPES = "https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/chat.messages https://www.googleapis.com/auth/admin.directory.user.readonly"

# Secrets (set via `npx wrangler secret put <NAME>`):
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
